<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 44" fill="none" role="img" aria-label="FlowDesk">
  <title>FlowDesk</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;display=swap');
    </style>

    <!-- Outer ambient glow -->
    <filter id="outerGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Glow halo layer -->
  <circle cx="16" cy="22" r="13" fill="#4F46FF" opacity="0.28" filter="url(#outerGlow)"/>

  <!-- Dot -->
  <circle cx="16" cy="22" r="7" fill="#4F46FF"/>

  <!-- Bright core -->
  <circle cx="16" cy="22" r="4" fill="#7C77FF" opacity="0.55"/>

  <!-- Wordmark: Syne 800, tracking -0.03em -->
  <text
    x="32"
    y="30"
    font-family="Syne, 'Segoe UI', system-ui, sans-serif"
    font-size="24"
    font-weight="800"
    letter-spacing="-0.72"
    fill="#EAEAF5"
  >FlowDesk</text>
</svg>
